<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lauren's Lemonade Stand | Financial & Legal Assistant Services</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --gold: #6C63B0;
    --gold-light: #E8E6F5;
    --gold-pale: #F4F3FB;
    --charcoal: #1E1C2E;
    --mid: #5A5870;
    --light: #F2F1FA;
    --white: #FFFFFF;
    --border: #D6D3ED;
  }
  html { scroll-behavior: smooth; }
  body { font-family: 'DM Sans', sans-serif; color: var(--charcoal); background: var(--white); line-height: 1.7; }

  /* NAV */
  nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 1.25rem 3rem; border-bottom: 1px solid var(--border);
    background: var(--white); position: sticky; top: 0; z-index: 100;
  }
  .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
  .logo-icon { width: 32px; height: 32px; background: var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; color: white; font-weight: 600; }
  .logo-text { font-family: 'Playfair Display', serif; font-size: 1.15rem; color: var(--charcoal); font-weight: 600; letter-spacing: -0.01em; }
  .logo-text span { color: var(--gold); }
  .nav-links { display: flex; gap: 2rem; list-style: none; }
  .nav-links a { text-decoration: none; font-size: 0.875rem; font-weight: 400; color: var(--mid); letter-spacing: 0.02em; transition: color 0.2s; }
  .nav-links a:hover { color: var(--gold); }
  .nav-cta {
    background: var(--gold); color: white; text-decoration: none;
    padding: 0.5rem 1.25rem; border-radius: 4px; font-size: 0.875rem;
    font-weight: 500; transition: background 0.2s;
  }
  .nav-cta:hover { background: #4E469A; }

  /* HERO */
  .hero {
    padding: 6rem 3rem 5rem;
    display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; align-items: center;
    max-width: 1100px; margin: 0 auto;
  }
  .hero-eyebrow {
    display: inline-block; font-size: 0.75rem; font-weight: 500; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--gold); border: 1px solid var(--gold);
    padding: 0.3rem 0.75rem; border-radius: 2px; margin-bottom: 1.5rem;
  }
  .hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: 3.25rem; font-weight: 600; line-height: 1.15;
    letter-spacing: -0.02em; color: var(--charcoal); margin-bottom: 1.5rem;
  }
  .hero h1 em { color: var(--gold); font-style: italic; }
  .hero p { font-size: 1.05rem; color: var(--mid); font-weight: 300; max-width: 440px; margin-bottom: 2.5rem; }
  .hero-btns { display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; }
  .btn-primary {
    background: var(--charcoal); color: white; padding: 0.85rem 2rem;
    border-radius: 4px; text-decoration: none; font-size: 0.9rem; font-weight: 500;
    transition: background 0.2s;
  }
  .btn-primary:hover { background: #0D0C1A; }
  .btn-secondary {
    color: var(--gold); text-decoration: none; font-size: 0.9rem; font-weight: 500;
    border-bottom: 1px solid var(--gold); padding-bottom: 1px; transition: opacity 0.2s;
  }
  .btn-secondary:hover { opacity: 0.75; }
  .hero-card {
    background: var(--light); border: 1px solid var(--border); border-radius: 8px;
    padding: 1.5rem 1.5rem; position: relative; max-width: 360px; margin-left: auto;
      <div class="service-card">
        <div class="service-icon">⚖️</div>
        <h3>Legal Document Drafting</h3>
        <p>Professional drafting of business contracts, service agreements, NDAs, and more. Specializing in tech companies, with expertise across all industries.</p>
        <span class="service-tag">Legal Assistant Support</span>
      </div>

    </div>
  </div>
</section>

<!-- ABOUT -->
<section id="about">
  <div class="section-inner">
    <div class="about-grid">
      <div>
        <div class="section-label">About</div>
        <h2 class="section-title">Experience you can count on</h2>
        <div class="about-badge">
          <div class="badge-dot"></div>
          Currently accepting new clients
        </div>
      </div>
      <div>
        <p>I'm Lauren — a financial operations professional with over a decade of experience helping businesses keep their books clean, their accounts organized, and their operations running efficiently.</p>
        <p>Alongside my financial background, I bring a strong legal assistant foundation with a focused emphasis on supporting technology companies and growing businesses. I have extensive experience drafting, reviewing, and organizing business agreements, ensuring they are clear, enforceable, and aligned with real-world operations. My work regularly includes SaaS contracts, software development agreements, service agreements, and intellectual property provisions.</p>
        <p>My background also spans accounts receivable, financial systems management, and process optimization across multiple industries, including HVAC services. I take a detail-oriented, systems-driven approach to every engagement — whether helping a startup implement its first QuickBooks setup or assisting an established company with contract structuring and internal process improvements.</p>
        <p>I bridge the gap between finance and legal operations, helping businesses — especially in the technology space — build strong foundations, reduce risk, and operate with confidence.</p>
        <div class="credentials">
          <div class="cred-item"><div class="cred-check">✓</div> QuickBooks Desktop & Online proficient</div>
          <div class="cred-item"><div class="cred-check">✓</div> 10+ years in financial operations</div>
          <div class="cred-item"><div class="cred-check">✓</div> Business contract drafting — all industries</div>
          <div class="cred-item"><div class="cred-check">✓</div> Tech company legal specialist</div>
          <div class="cred-item"><div class="cred-check">✓</div> Salesforce, ERP, CRM systems experience</div>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- PROCESS -->
<section class="services-bg" id="process">
  <div class="section-inner">
    <div class="section-label">How it works</div>
    <h2 class="section-title">Simple, straightforward process</h2>
    <div class="process-steps">
      <div class="step">
        <div class="step-num">1</div>
        <h4>Free consultation</h4>
        <p>We'll talk through your business needs, current pain points, and what you're looking for.</p>
      </div>
      <div class="step">
        <div class="step-num">2</div>
        <h4>Custom proposal</h4>
        <p>I'll outline exactly what services make sense for you — no bundles you don't need.</p>
      </div>
      <div class="step">
        <div class="step-num">3</div>
        <h4>Onboarding</h4>
        <p>Quick, organized setup. I review your existing records, systems, and documents to get up to speed.</p>
      </div>
      <div class="step">
        <div class="step-num">4</div>
        <h4>Ongoing support</h4>
        <p>Regular communication, clear deliverables, and full transparency every step of the way.</p>
      </div>
    </div>
  </div>
</section>

<!-- CTA -->
<div class="cta-banner" id="contact">
  <div class="section-label">Ready to get started?</div>
  <h2 class="section-title" style="font-family:'Playfair Display',serif;font-size:2.25rem;margin-bottom:1rem;">Let's work together</h2>
  <p>Drop your email and I'll be in touch within one business day to schedule a free intro call.</p>
  <form action="https://formspree.io/f/mlgoadlb" method="POST" id="contact-form">
    <div class="cta-form">
      <input class="cta-input" type="text" name="name" placeholder="Your name" required />
      <input class="cta-input" type="email" name="email" placeholder="Your email address" required />
      <button type="submit" class="btn-gold">Send →</button>
    </div>
    <p id="form-status" style="margin-top:1rem;font-size:0.875rem;color:#ABABAB;min-height:1.2em;"></p>
  </form>
</div>

<script>
  const form = document.getElementById('contact-form');
  const status = document.getElementById('form-status');
  form.addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn = form.querySelector('button[type="submit"]');
    btn.textContent = 'Sending...';
    btn.disabled = true;
    const data = new FormData(form);
    try {
      const response = await fetch(form.action, {
        method: 'POST',
        body: data,
        headers: { 'Accept': 'application/json' }
      });
      if (response.ok) {
        status.textContent = '✓ Message received! I\'ll be in touch within one business day.';
        status.style.color = '#9B95D4';
        form.reset();
      } else {
        status.textContent = 'Something went wrong. Please try again or email me directly.';
        status.style.color = '#e55';
      }
    } catch {
      status.textContent = 'Something went wrong. Please try again or email me directly.';
      status.style.color = '#e55';
    }
    btn.textContent = 'Send →';
    btn.disabled = false;
  });
</script>

<!-- FOOTER -->
<footer>
  <span>© 2026 Lauren's Lemonade Stand. All rights reserved.</span>
  <div style="display:flex;gap:1.5rem;">
    <a href="#services">Services</a>
    <a href="#about">About</a>
    <a href="#contact">Contact</a>
  </div>
</footer>

</body>
</html>
